<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - Inventory Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Sidebar -->
  <div class="fixed top-0 left-0 h-full w-64 bg-white shadow-md z-30 -translate-x-full md:translate-x-0">
    <div class="p-6">
      <h1 class="text-2xl font-bold text-gray-800">InventorySys</h1>
    </div>
    <nav class="mt-6">
      <a href="dashboard.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Dashboard</a>
      <a href="purchase.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Purchases</a>
      <a href="sales.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Sales</a>
      <a href="report.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Reports</a>
      <a href="settings.html" class="block py-2.5 px-4 rounded bg-gray-200 font-bold">Settings</a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="md:ml-64 flex flex-col flex-1">
    <!-- Header -->
    <header class="flex items-center justify-between bg-white p-4 shadow-md">
      <h2 class="text-2xl font-semibold text-gray-800">Settings</h2>
      <!-- Profile Dropdown -->
      <div class="relative">
        <button id="profileButton" class="flex items-center space-x-2 focus:outline-none">
          <img src="https://i.pravatar.cc/40" alt="Avatar" class="w-8 h-8 rounded-full">
          <span class="text-gray-800 font-medium hidden sm:inline">Shayan</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <!-- Dropdown -->
        <div id="profileMenu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-50">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
          <a href="settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Settings</a>
          <button class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-100">Logout</button>
        </div>
      </div>
    </header>

    <!-- Settings Form -->
    <main class="p-6 space-y-8">
      <!-- Profile Settings -->
      <section class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">User Profile</h3>
        <form class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">Full Name</label>
              <input type="text" class="mt-1 block w-full rounded border-gray-300 shadow-sm" placeholder="John Doe" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Email</label>
              <input type="email" class="mt-1 block w-full rounded border-gray-300 shadow-sm" placeholder="john@example.com" />
            </div>
          </div>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Update Profile</button>
        </form>
      </section>

      <!-- Preferences -->
      <section class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Preferences</h3>
        <div class="flex items-center space-x-4">
          <label for="theme" class="text-gray-700">Theme:</label>
          <select id="theme" class="rounded border-gray-300 shadow-sm">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <!-- Change Password -->
      <section class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Change Password</h3>
        <form class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Current Password</label>
            <input type="password" class="mt-1 block w-full rounded border-gray-300 shadow-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">New Password</label>
            <input type="password" class="mt-1 block w-full rounded border-gray-300 shadow-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Confirm New Password</label>
            <input type="password" class="mt-1 block w-full rounded border-gray-300 shadow-sm" />
          </div>
          <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Change Password</button>
        </form>
      </section>
    </main>
  </div>

  <!-- Script for dropdown -->
  <script>
    const profileButton = document.getElementById('profileButton');
    const profileMenu = document.getElementById('profileMenu');

    profileButton.addEventListener('click', () => {
      profileMenu.classList.toggle('hidden');
    });

    window.addEventListener('click', (e) => {
      if (!profileButton.contains(e.target)) {
        profileMenu.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
