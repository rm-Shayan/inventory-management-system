<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchases | InventorySys</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

  <!-- Sidebar -->
  <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-md z-30 -translate-x-full md:translate-x-0">
    <div class="p-6">
      <h1 class="text-2xl font-bold text-gray-800">InventorySys</h1>
    </div>
    <nav class="mt-6">
      <a href="dashboard.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Dashboard</a>
      <a href="purchase.html" class="block py-2.5 px-4 rounded bg-gray-200 text-gray-900 font-semibold">Purchases</a>
      <a href="sales.html" class="block py-2.5 px-4 rounded hover:bg-gray-200">Sales</a>
      <a href="#" class="block py-2.5 px-4 rounded hover:bg-gray-200">Reports</a>
      <a href="#" class="block py-2.5 px-4 rounded hover:bg-gray-200">Settings</a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="md:ml-64 flex flex-col flex-1">
    <!-- Header -->
    <header class="flex items-center justify-between bg-white p-4 shadow-md">
      <div class="flex items-center">
        <button id="menu-button" class="md:hidden text-gray-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h2 class="text-2xl font-semibold text-gray-800 ml-4">Purchases</h2>
      </div>
      <button class="bg-blue-500 text-white px-4 py-2 rounded-lg">Add Supplier</button>
    </header>

    <!-- Content Area -->
    <main class="p-6 space-y-6">
      
      <!-- Purchase Form -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Add New Purchase</h3>
        <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" placeholder="Supplier Name" class="border p-2 rounded w-full" required />
          <input type="text" placeholder="Product Name" class="border p-2 rounded w-full" required />
          <input type="number" placeholder="Quantity" class="border p-2 rounded w-full" required />
          <input type="number" placeholder="Total Amount (₨)" class="border p-2 rounded w-full" required />
          <input type="date" class="border p-2 rounded w-full md:col-span-2" required />
          <button type="submit" class="bg-green-500 text-white py-2 px-6 rounded col-span-1 md:col-span-2 hover:bg-green-600 transition">Submit Purchase</button>
        </form>
      </div>

      <!-- Purchase Table -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Purchase History</h3>
        <div class="overflow-x-auto">
          <table class="min-w-full table-auto">
            <thead>
              <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                <th class="py-3 px-6 text-left">Purchase ID</th>
                <th class="py-3 px-6 text-left">Supplier</th>
                <th class="py-3 px-6 text-left">Product</th>
                <th class="py-3 px-6 text-center">Quantity</th>
                <th class="py-3 px-6 text-center">Amount</th>
                <th class="py-3 px-6 text-center">Date</th>
              </tr>
            </thead>
            <tbody class="text-gray-700 text-sm font-light">
  <tr class="border-b hover:bg-gray-100">
    <td class="py-3 px-6">#P-1002</td>
    <td class="py-3 px-6">XYZ Traders</td>
    <td class="py-3 px-6">LED Bulbs</td>
    <td class="py-3 px-6 text-center">50</td>
    <td class="py-3 px-6 text-center">₨3,500</td>
    <td class="py-3 px-6 text-center">2025-05-18</td>
    <td class="py-3 px-6 text-center">
      <div class="flex justify-center items-center space-x-2">
        <!-- Edit Icon -->
        <button title="Edit" class="text-blue-500 hover:text-blue-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M16.5 3.5a2.121 2.121 0 113 3L12 14l-4 1 1-4 7.5-7.5z" />
          </svg>
        </button>
        <!-- Delete Icon -->
        <button title="Delete" class="text-red-500 hover:text-red-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4a1 1 0 011 1v1H9V4a1 1 0 011-1zM4 7h16" />
          </svg>
        </button>
      </div>
    </td>
  </tr>
</tbody>

          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Sidebar Toggle Script -->
  <script>
    const menuButton = document.getElementById('menu-button');
    const sidebar = document.getElementById('sidebar');
    menuButton.addEventListener('click', () => {
      sidebar.classList.toggle('-translate-x-full');
    });
  </script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/helper.js"></script>
<script type="module" src="js/purchase.js"></script>
</body>
</html>
