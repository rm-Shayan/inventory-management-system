<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sales | InventorySys</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

  <!-- Loader (hidden by default) -->
  <div id="loader" class="hidden fixed inset-0 z-50 bg-white flex flex-col items-center justify-center space-y-4">
    <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-gray-700 text-lg font-medium tracking-wide">Loading InventorySys...</p>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-md z-30 transform transition-transform duration-300 -translate-x-full md:translate-x-0">
    <div class="p-6 relative border-b border-gray-200">
      <h1 class="text-2xl font-bold text-gray-800">InventorySys</h1>
      <button id="cutBtn" class="absolute top-6 right-4 text-xl font-bold text-blue-800 cursor-pointer md:hidden">✕</button>
    </div>
    <nav class="mt-6">
        <a href="dashboard.html" class="block py-2.5 px-4 rounded hover:bg-gray-200 transition">Dashboard</a>
        <a href="#" class="block py-2.5 px-4 rounded bg-gray-200 text-gray-900 font-semibold">Sales</a>
        <a href="purchase.html" class="block py-2.5 px-4 rounded hover:bg-gray-200 transition">Purchases</a>
        <a href="report.html" class="block py-2.5 px-4 rounded hover:bg-gray-200 transition">Reports</a>
      <a href="settings.html" class="block py-2.5 px-4 rounded hover:bg-gray-200 transition">Settings</a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="md:ml-64 flex flex-col flex-1 min-h-screen">

    <!-- Header -->
    <header class="flex items-center justify-between bg-white p-4 shadow-md">
      <div class="flex items-center">
        <button id="menuButton" class="md:hidden text-3xl text-gray-800 hover:text-gray-600 transition">&#9776;</button>
        <h2 class="text-2xl font-semibold text-gray-800 ml-4">Sales</h2>
      </div>
      <button
        id="showFormBtn"
        class="bg-gradient-to-r from-green-400 to-blue-500 text-white py-2 px-6 rounded-md hover:from-green-500 hover:to-blue-600 transition font-semibold shadow-lg"
      >
        Add Sales
      </button>
    </header>

    <!-- Content Area -->
    <main class="p-6 space-y-6">

      <!-- Purchase Form (hidden by default) -->
      <div id="purchaseForm" class="hidden bg-white p-6 rounded-lg shadow-lg max-w-xl mx-auto">
        <h3 class="text-2xl font-semibold mb-6 text-gray-900">Add New Sale</h3>
        <form id="addPurchaseForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <input
            type="text"
            name="customer"
            placeholder="Customer Name"
            class="border border-gray-300 rounded-md p-3 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          />
          <input
            type="text"
            name="product"
            placeholder="Product Name"
            class="border border-gray-300 rounded-md p-3 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          />

          <div class="relative">
            <select
              name="category"
              required
              class="appearance-none w-full border border-gray-300 rounded-md p-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition cursor-pointer"
            >
              <option value="" disabled selected>Select Category</option>
              <option value="electronics">Electronics</option>
              <option value="furniture">Furniture</option>
              <option value="stationery">Stationery</option>
              <option value="groceries">Groceries</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>

          <input
            type="number"
            name="quantity"
            placeholder="Quantity"
            class="border border-gray-300 rounded-md p-3 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
            min="1"
          />
          <input
            type="number"
            name="amount"
            placeholder="Total Amount (₨)"
            class="border border-gray-300 rounded-md p-3 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
            min="0"
            step="0.01"
          />
          <input
            type="date"
            name="date"
            class="border border-gray-300 rounded-md p-3 w-full md:col-span-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          />

          <button
            type="submit"
            class="bg-gradient-to-r from-green-400 to-blue-500 text-white py-3 px-8 rounded-md col-span-1 md:col-span-2 hover:from-green-500 hover:to-blue-600 transition font-semibold shadow-lg"
          >
            Submit Sale
          </button>
        </form>
      </div>

      <!-- Purchase Table -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4">Sales History</h3>
        <div class="overflow-x-auto">
          <table id="purchaseTable" class="min-w-full table-auto">
            <thead>
              <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                <th class="py-3 px-6 text-left">Sales ID</th>
                <th class="py-3 px-6 text-left">Customer</th>
                <th class="py-3 px-6 text-left">Product</th>
                <th class="py-3 px-6 text-left">Category</th>
                <th class="py-3 px-6 text-center">Quantity</th>
                <th class="py-3 px-6 text-center">Amount</th>
                <th class="py-3 px-6 text-center">Date</th>
                <th class="py-3 px-6 text-center">Actions</th>
              </tr>
            </thead>
            <tbody class="text-gray-700 text-sm font-light" id="purchaseTableBody">
              <!-- Rows will be inserted here -->
              <tr class="border-b hover:bg-gray-100">
                <td class="py-3 px-6">#P-1002</td>
                <td class="py-3 px-6">XYZ Traders</td>
                <td class="py-3 px-6">LED Bulbs</td>
                <td class="py-3 px-6">Electronics</td>
                <td class="py-3 px-6 text-center">50</td>
                <td class="py-3 px-6 text-center">₨3,500</td>
                <td class="py-3 px-6 text-center">2025-05-18</td>
                <td class="py-3 px-6 text-center">
                  <div class="flex justify-center items-center space-x-2">
                    <button title="Edit" class="text-blue-500 hover:text-blue-700">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M16.5 3.5a2.121 2.121 0 113 3L12 14l-4 1 1-4 7.5-7.5z" />
                      </svg>
                    </button>
                    <button title="Delete" class="text-red-500 hover:text-red-700 delete-btn">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4a1 1 0 011 1v1H9V4a1 1 0 011-1zM4 7h16" />
                      </svg>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Scripts -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/sales.js"></script>
</body>
</html>
