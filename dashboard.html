<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory Dashboard | InventorySys</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">


  <div id="loader" class="hidden fixed inset-0 z-50 bg-white flex flex-col items-center justify-center space-y-4">
    <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-gray-700 text-lg font-medium tracking-wide">Loading InventorySys...</p>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-md z-40 transform transition-transform duration-300 -translate-x-full md:translate-x-0">
    <div class="p-6 relative border-b border-gray-200 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-800">InventorySys</h1>
      <button id="sidebarCloseBtn" class="text-xl font-bold text-gray-600 cursor-pointer md:hidden hover:text-blue-600" aria-label="Close Sidebar">✕</button>
    </div>
    <nav class="mt-6 flex flex-col space-y-1">
      <a href="#" class="block py-3 px-5 rounded bg-blue-100 text-blue-700 font-semibold">Dashboard</a>
      <a href="sales.html" class="block py-3 px-5 rounded hover:bg-gray-200 transition-colors font-semibold text-gray-700">Sales</a>
      <a href="purchase.html" class="block py-3 px-5 rounded hover:bg-gray-200 transition-colors text-gray-700">Purchases</a>
      <a href="report.html" class="block py-3 px-5 rounded hover:bg-gray-200 transition-colors text-gray-700">Reports</a>
      <a href="settings.html" class="block py-3 px-5 rounded hover:bg-gray-200 transition-colors text-gray-700">Settings</a>
    </nav>
  </div>

  <!-- Main content wrapper -->
  <div class="md:ml-64 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-md p-4 flex items-center justify-between sticky top-0 z-30">
      <button id="sidebarOpenBtn" class="text-gray-700 md:hidden text-2xl" aria-label="Open Sidebar">☰</button>
      <h2 class="text-xl font-semibold text-gray-800"> Dashboard</h2>

      <!-- Profile Menu -->
      <div class="relative">
        <button id="profileButton" class="flex items-center space-x-2 focus:outline-none">
          <img src="https://i.pravatar.cc/40" alt="Profile" class="rounded-full w-10 h-10 object-cover" />
          <span class="hidden md:block font-medium text-gray-700"></span>
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="profileMenu" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-md shadow-lg border border-gray-200 py-1 z-50">
          <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Profile</a>
          <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Settings</a>
          <div class="border-t border-gray-200"></div>
          <a href="#" id="Logout" class="block px-4 py-2 text-red-600 hover:bg-red-100 font-semibold">Logout</a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="p-6 flex-1 bg-gray-100">
      <!-- Statistical Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-6" id="statisticsCards">
       
      </div>

      <!-- Charts Section -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <!-- Monthly Sales Line Chart -->
        <section class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-xl font-semibold mb-4 text-gray-800">Monthly Sales Overview</h3>
          <canvas id="salesChart" class="w-full h-64"></canvas>
        </section>

        <!-- Category Distribution Pie Chart -->
        <section class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-xl font-semibold mb-4 text-gray-800">Category Distribution</h3>
          <canvas id="categoryChart" class="w-full h-64"></canvas>
        </section>
      </div>

      <!-- Recent Purchases Table (optional placeholder) -->
      <section class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-semibold mb-4 text-gray-800">Recent Purchases</h3>
        <div class="overflow-x-auto">
          <table class="min-w-full table-auto border-collapse border border-gray-300">
            <thead>
              <tr class="bg-gray-50">
                <th class="border border-gray-300 px-4 py-2 text-left text-sm font-medium text-gray-700">Product</th>
                <th class="border border-gray-300 px-4 py-2 text-left text-sm font-medium text-gray-700">Category</th>
                <th class="border border-gray-300 px-4 py-2 text-left text-sm font-medium text-gray-700">Quantity</th>
                <th class="border border-gray-300 px-4 py-2 text-left text-sm font-medium text-gray-700">Price</th>
                <th class="border border-gray-300 px-4 py-2 text-left text-sm font-medium text-gray-700">Date</th>
              </tr>
            </thead>
            <tbody>
              <tr class="hover:bg-gray-100">
                <td class="border border-gray-300 px-4 py-2">Laptop</td>
                <td class="border border-gray-300 px-4 py-2">Electronics</td>
                <td class="border border-gray-300 px-4 py-2">5</td>
                <td class="border border-gray-300 px-4 py-2">₨70,000</td>
                <td class="border border-gray-300 px-4 py-2">2025-05-20</td>
              </tr>
              <tr class="hover:bg-gray-100">
                <td class="border border-gray-300 px-4 py-2">T-shirt</td>
                <td class="border border-gray-300 px-4 py-2">Clothing</td>
                <td class="border border-gray-300 px-4 py-2">20</td>
                <td class="border border-gray-300 px-4 py-2">₨3,000</td>
                <td class="border border-gray-300 px-4 py-2">2025-05-21</td>
              </tr>
              <!-- Add more rows dynamically as needed -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- JavaScript for Sidebar Toggle, Profile Menu & Charts -->
  <script>
    // Sidebar Toggle Buttons
    const sidebar = document.getElementById('sidebar');
    const sidebarOpenBtn = document.getElementById('sidebarOpenBtn');
    const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');

    sidebarOpenBtn.addEventListener('click', () => {
      sidebar.classList.remove('-translate-x-full');
    });

    sidebarCloseBtn.addEventListener('click', () => {
      sidebar.classList.add('-translate-x-full');
    });

    // Profile Menu Toggle
    const profileButton = document.getElementById('profileButton');
    const profileMenu = document.getElementById('profileMenu');

    profileButton.addEventListener('click', (e) => {
      e.stopPropagation();
      profileMenu.classList.toggle('hidden');
    });

    window.addEventListener('click', () => {
      profileMenu.classList.add('hidden');
    });

    // Chart.js Initialization

    // Monthly Sales Line Chart
    const salesCtx = document.getElementById('salesChart').getContext('2d');
    const salesChart = new Chart(salesCtx, {
      type: 'line',
      data: {
        labels: ['January', 'February', 'March', 'April', 'May'],
        datasets: [{
          label: 'Sales',
          data: [12000, 15000, 14000, 17000, 16000],
          backgroundColor: 'rgba(59, 130, 246, 0.2)',
          borderColor: 'rgba(59, 130, 246, 1)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: 'rgba(59, 130, 246, 1)'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          title: {
            display: true,
            text: 'Monthly Sales'
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    // Category Distribution Pie Chart
    const categoryCtx = document.getElementById('categoryChart').getContext('2d');
    const categoryChart = new Chart(categoryCtx, {
      type: 'pie',
      data: {
        labels: ['Electronics', 'Clothing', 'Home Appliances', 'Books'],
        datasets: [{
          label: 'Categories',
          data: [30, 25, 20, 25],
          backgroundColor: [
            'rgba(255, 99, 132, 0.6)',
            'rgba(54, 162, 235, 0.6)',
            'rgba(255, 206, 86, 0.6)',
            'rgba(75, 192, 192, 0.6)'
          ],
          borderColor: [
            'rgba(255, 99, 132, 1)',
            'rgba(54, 162, 235, 1)',
            'rgba(255, 206, 86, 1)',
            'rgba(75, 192, 192, 1)'
          ],
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          title: {
            display: true,
            text: 'Category Distribution'
          }
        }
      }
    });
  </script>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
